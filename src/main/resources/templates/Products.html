<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Products</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    .page-title {
        font-size: 32px;
        font-weight: 700;
        color: #0d6efd;
        letter-spacing: 1px;
        margin-bottom: 25px;
    }
</style>

</head>
<body class="container mt-4">

<!-- Success Message -->
<div th:if="${msg}" 
     class="alert alert-success alert-dismissible fade show" 
     role="alert">

    <span th:text="${msg}"></span>

    <button type="button" 
            class="btn-close" 
            data-bs-dismiss="alert" 
            aria-label="Close"></button>
</div>
<div class="card shadow">

    <div class="card-header bg-primary text-white position-relative py-3">

        <!-- Center Title -->
        <h4 class="text-center mb-0">📦 All Products</h4>

        <!-- Right Corner Button -->
        <a th:href="@{/product-form}"
           class="btn btn-danger position-absolute top-50 end-0 translate-middle-y me-3">
            Add Product +
        </a>

    </div>
<table class="table table-bordered table-striped table-hover text-center">
    
    <thead class="table-dark">
        <tr>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Product Category</th>
            <th>Product Quantity</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="product : ${Products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.qty}"></td>
        </tr>
    </tbody>

</table>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
