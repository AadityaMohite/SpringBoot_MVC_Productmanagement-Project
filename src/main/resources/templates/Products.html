<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Products</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    .page-title {
        font-size: 32px;
        font-weight: 700;
        color: #0d6efd;
        letter-spacing: 1px;
        margin-bottom: 25px;
    }
    
    .pagination-container {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.page-btn,
.page-number a {
    padding: 8px 14px;
    text-decoration: none;
    border-radius: 6px;
    background-color: #0d6efd;
    color: white;
    font-weight: 500;
    transition: 0.3s ease;
}

.page-btn:hover,
.page-number a:hover {
    background-color: #084298;
    transform: translateY(-2px);
}

.page-number.active a {
    background-color: #198754;
}

.page-number {
    display: inline-block;
}
   
</style>

</head>
<body class="container mt-4">

<!-- Success Message -->
<div th:if="${msg}" 
     class="alert alert-success alert-dismissible fade show" 
     role="alert">

    <span th:text="${msg}"></span>

    <button type="button" 
            class="btn-close" 
            data-bs-dismiss="alert" 
            aria-label="Close"></button>
</div>
<div class="card shadow">

    <div class="card-header bg-primary text-white position-relative py-3">

        <!-- Center Title -->
        <h4 class="text-center mb-0">📦 All Products</h4>

        <!-- Right Corner Button -->
        <a th:href="@{/product-form}"
           class="btn btn-danger position-absolute top-50 end-0 translate-middle-y me-3">
            Add Product +
        </a>

    </div>
    <div class="table-container">
<table class="table table-bordered table-striped table-hover text-center">
    
    <thead class="table-dark">
        <tr>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Product Category</th>
            <th>Product Quantity</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="product : ${Products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.qty}"></td>
            <td> <a th:href="@{/update?(id=${product.id})}" class="btn btn-info">Update</a> 
            <a  th:href="@{/delete?(id=${product.id})}"   class="btn btn-danger"  onclick="return confirm('Are you want to delete Student data ?');">Delete</a></td>
        </tr>
    </tbody>
    

</table>



</div>

</div>
<div class="pagination-container">

    <a th:if="${currentpage > 0}"
       th:href="@{/Products(page=${currentpage - 1})}"
       class="page-btn">
        ⬅ Previous
    </a>

    

    <a th:if="${currentpage < totalpages - 1}"
       th:href="@{/Products(page=${currentpage + 1})}"
       class="page-btn">
        Next ➡
    </a>

</div>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
