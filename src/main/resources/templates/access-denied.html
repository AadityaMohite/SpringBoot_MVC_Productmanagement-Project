<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c3e50);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #ff4d4d;
        }

        h2 {
            margin: 10px 0;
            font-weight: normal;
        }

        p {
            margin: 15px 0;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff4d4d;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff1a1a;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="icon">🚫</div>
    <h1>403</h1>
    <h2>Access Denied</h2>
    <p>You don’t have permission to perform this action.</p>
    <p>Please contact admin if you think this is a mistake.</p>

    <!-- Thymeleaf dynamic URL -->
    <a th:href="@{/product-form}" class="btn">⬅ Go to Home</a>
</div>

</body>
</html>
